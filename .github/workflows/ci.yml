name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check

  postgres-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v7
      - name: Create Supabase-compatible roles
        run: psql -h localhost -U postgres -c "create role anon nologin; create role authenticated nologin; create role service_role nologin;"
      - name: Apply migrations
        run: psql -v ON_ERROR_STOP=1 -h localhost -U postgres -f supabase/migrations/20260714000100_initial_collaboration_schema.sql
      - name: Verify RLS
        run: >-
          psql -h localhost -U postgres -Atc
          "select count(*) from pg_class c join pg_namespace n on n.oid=c.relnamespace where n.nspname='public' and c.relkind='r' and not c.relrowsecurity"
          | grep '^0$'
